<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamento Online | Novas Dècor</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Open Sans', sans-serif; background-color: #000; color: #fff; line-height: 1.6; font-weight: 600; }
        h1, h2, h3 { font-family: 'Montserrat', sans-serif; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        
        :root {
            --primary: #ffffff;
            --bg-card: #111111;
            --accent: #25D366; 
        }

        header { background: #000; padding: 20px 0; border-bottom: 3px solid var(--primary); position: fixed; width: 100%; top: 0; z-index: 1000; }
        header .flex { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 15px; font-size: 1.4rem; color: #fff; }
        .logo img { max-height: 55px; width: auto; border-radius: 50%; border: 2px solid #fff; }

        .btn-zap-header { 
            background: var(--primary); color: #000; padding: 12px 25px; border-radius: 4px; 
            text-decoration: none; font-weight: 800; font-size: 0.9rem; 
            text-transform: uppercase; transition: 0.3s;
        }

        .hero { 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0.95)), url('fundo.jpg'); 
            background-size: cover; background-position: center; 
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 140px 0 80px 0;
        }
        .hero h1 { font-size: 3rem; line-height: 1; margin-bottom: 10px; }
        .hero h1 span { background: #fff; color: #000; padding: 0 10px; }
        .hero p { font-size: 1.1rem; color: #aaa; margin-bottom: 40px; font-weight: 700; text-transform: uppercase; }

        .calculator-box {
            background: var(--bg-card); padding: 40px; border-radius: 8px;
            box-shadow: 0 0 40px rgba(255,255,255,0.1);
            max-width: 600px; width: 100%; margin: 0 auto; border: 2px solid #222;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 800; margin-bottom: 10px; font-size: 0.8rem; color: #fff; text-transform: uppercase; }
        .form-group input, .form-group select { 
            width: 100%; padding: 14px; border: 2px solid #333; border-radius: 4px; 
            font-size: 1rem; font-weight: 700; background: #000; color: #fff; outline: none;
        }
        .form-group input:focus { border-color: #fff; }
        
        .btn-calc { 
            width: 100%; background: #fff; color: #000; 
            border: none; padding: 20px; font-size: 1.2rem; font-weight: 900; text-transform: uppercase; 
            border-radius: 4px; cursor: pointer; transition: 0.3s;
        }
        .btn-calc:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 2000;
            display: none; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--bg-card); padding: 40px; border-radius: 8px;
            max-width: 500px; width: 95%; text-align: center; border: 3px solid #fff;
        }
        .price-display { background: #fff; padding: 25px; border-radius: 4px; margin: 25px 0; width: 100%; }
        .total-value { font-size: 3rem; font-weight: 900; color: #000; word-break: break-all; line-height: 1; }
        
        .btn-action { 
            display: flex; justify-content: center; align-items: center; gap: 12px;
            width: 100%; background: var(--accent); color: white; 
            padding: 22px; text-decoration: none; font-weight: 800; border-radius: 4px; 
            font-size: 1.2rem; text-transform: uppercase;
        }

        footer { background: #000; padding: 60px 0; border-top: 2px solid #111; text-align: center; }
        .footer-text { font-size: 0.8rem; color: #444; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.2rem; }
            .total-value { font-size: 2.2rem; }
            .calculator-box { padding: 25px; }
            .modal-content { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container flex">
            <div class="logo">
                <img src="logo.png" alt="Novas Dècor"> 
                <div style="font-weight: 900;">NOVAS <span style="color: #666;">DÈCOR</span></div>
            </div>
            <a href="https://wa.me/5511967308598" target="_blank" class="btn-zap-header">Atendimento</a>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <p>Padrão de Luxo e Instalação Expert</p>
            <h1>O PISO DOS SEUS <span>SONHOS</span></h1>
            
            <div class="calculator-box">
                <div class="form-group">
                    <label>Metragem da Área (m²)</label>
                    <input type="number" id="metragem" placeholder="Ex: 50">
                </div>

                <div class="form-group">
                    <label>Tipo de Piso Atual</label>
                    <select id="pisoAtual">
                        <option value="Contrapiso">Contrapiso (Cimento)</option>
                        <option value="Cerâmica">Cerâmica / Porcelanato</option>
                        <option value="Taco">Madeira / Taco</option>
                        <option value="Outros">Outros / Não sei</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Modelo de Piso</label>
                    <select id="modelo">
                        <option value="98.90">Laminado Click Eucafloor (R$ 98,90/m²)</option>
                        <option value="109.90">Vinílico Absolut Residencial (R$ 109,90/m²)</option>
                        <option value="119.90">Vinílico Sublime (R$ 119,90/m²)</option>
                    </select>
                </div>

                <div class="form-group" style="display:flex; align-items:center; gap:12px; padding: 15px; background: #0a0a0a; border-radius: 4px; border: 1px solid #333;">
                    <input type="checkbox" id="rodape" style="width:20px; height: 20px; accent-color: #fff; cursor: pointer;">
                    <label for="rodape" style="margin:0; cursor:pointer; color: #ffffff !important; font-size: 0.8rem; font-weight: 700;">Incluir Rodapé Premium 7cm Branco (R$ 17,90m)</label>
                </div>

                <button class="btn-calc" onclick="calcular()">Calcular Projeto</button>
            </div>
        </div>
    </section>

    <div class="modal-overlay" id="modalResult">
        <div class="modal-content">
            <h2 style="letter-spacing: 2px; font-size: 1.2rem;">VALOR ESTIMADO</h2>
            <div class="price-display">
                <div class="total-value" id="valorFinal">R$ 0,00</div>
            </div>
            <div style="text-align: left; margin-bottom: 25px; font-weight: 700; color: #888; font-size: 0.9rem;">
                <p style="margin-bottom: 8px;"><i class="fas fa-check"></i> <span id="pisoNome" style="color:#fff"></span></p>
                <p><i class="fas fa-check"></i> Rodapé: <span id="statusRodape" style="color:#fff"></span></p>
            </div>
            <a href="#" id="linkZap" class="btn-action" target="_blank">
                Confirmar no WhatsApp <i class="fab fa-whatsapp"></i>
            </a>
            <button onclick="document.getElementById('modalResult').style.display='none'" style="background:none; border:none; color:#444; margin-top:25px; cursor:pointer; font-weight:900; text-transform:uppercase; font-size: 0.8rem;">Voltar</button>
        </div>
    </div>

    <script>
        function calcular() {
            const m2 = parseFloat(document.getElementById('metragem').value);
            const selectPiso = document.getElementById('modelo');
            const precoPiso = parseFloat(selectPiso.value);
            const modeloTexto = selectPiso.options[selectPiso.selectedIndex].text.split('(')[0];
            const temRodape = document.getElementById('rodape').checked;
            
            if (!m2 || m2 <= 0) {
                alert("Por favor, informe a metragem.");
                return;
            }

            let total = m2 * precoPiso;
            let infoRodape = "Não incluso";

            if (temRodape) {
                total += (m2 * 17.90);
                infoRodape = "Premium 7cm Branco";
            }

            const totalFormatado = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('valorFinal').innerText = totalFormatado;
            document.getElementById('pisoNome').innerText = modeloTexto;
            document.getElementById('statusRodape').innerText = infoRodape;

            const msg = `Olá Novas Dècor! Simulação realizada:\n` +
                        `- Área: ${m2}m²\n` +
                        `- Piso: ${modeloTexto}\n` +
                        `- Rodapé: ${infoRodape}\n` +
                        `- Estimativa: ${totalFormatado}`;

            document.getElementById('linkZap').href = `https://wa.me/5511967308598?text=${encodeURIComponent(msg)}`;
            document.getElementById('modalResult').style.display = 'flex';
        }
    </script>
</body>
</html>
